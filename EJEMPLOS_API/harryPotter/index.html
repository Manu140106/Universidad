<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Explorador Harry Potter API</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg-1: #efe8d7;
			--bg-2: #c6b48a;
			--ink: #1f1a14;
			--card: #fff9ee;
			--line: #4e3f2a;
			--gold: #b68d40;
			--accent: #8b1e3f;
			--ok: #1f7a4f;
			--danger: #8d2f2f;
			--shadow: rgba(0, 0, 0, 0.2);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Manrope", "Segoe UI", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.25), transparent 28%),
				radial-gradient(circle at 15% 80%, rgba(139, 30, 63, 0.12), transparent 32%),
				linear-gradient(130deg, var(--bg-1), var(--bg-2));
			padding: 24px;
		}

		.app {
			max-width: 1200px;
			margin: 0 auto;
			background: rgba(255, 249, 238, 0.9);
			border: 2px solid var(--line);
			border-radius: 20px;
			box-shadow: 0 16px 40px var(--shadow);
			overflow: hidden;
		}

		header {
			padding: 28px 24px 20px;
			border-bottom: 2px dashed var(--line);
			background: linear-gradient(90deg, rgba(182, 141, 64, 0.22), rgba(139, 30, 63, 0.12));
		}

		h1 {
			font-family: "Cinzel", serif;
			font-size: clamp(1.5rem, 2vw + 1rem, 2.6rem);
			letter-spacing: 0.06em;
			text-transform: uppercase;
			margin-bottom: 8px;
		}

		.subtitle {
			font-size: 0.95rem;
			opacity: 0.9;
		}

		.controls {
			display: grid;
			grid-template-columns: 1.8fr 1fr auto;
			gap: 12px;
			padding: 18px 24px;
			border-bottom: 1px solid rgba(78, 63, 42, 0.25);
			background: rgba(255, 255, 255, 0.45);
		}

		input,
		select,
		button {
			border: 1.5px solid var(--line);
			border-radius: 10px;
			font: inherit;
			padding: 10px 12px;
			background: #fff;
			color: var(--ink);
		}

		input:focus,
		select:focus,
		button:focus {
			outline: 2px solid var(--gold);
			outline-offset: 1px;
		}

		button {
			cursor: pointer;
			font-weight: 700;
			background: linear-gradient(160deg, #f6e6be, #dcb15f);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
			box-shadow: 0 4px 10px rgba(182, 141, 64, 0.3);
		}

		button:hover {
			transform: translateY(-1px);
			box-shadow: 0 8px 14px rgba(182, 141, 64, 0.35);
		}

		.status {
			margin: 16px 24px 0;
			padding: 10px 12px;
			border-radius: 10px;
			font-size: 0.92rem;
			display: none;
		}

		.status.ok {
			display: block;
			background: rgba(31, 122, 79, 0.1);
			border: 1px solid rgba(31, 122, 79, 0.45);
			color: var(--ok);
		}

		.status.error {
			display: block;
			background: rgba(141, 47, 47, 0.1);
			border: 1px solid rgba(141, 47, 47, 0.45);
			color: var(--danger);
		}

		.grid {
			padding: 20px 24px 28px;
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 14px;
		}

		.card {
			background: var(--card);
			border: 1px solid rgba(78, 63, 42, 0.38);
			border-radius: 12px;
			overflow: hidden;
			cursor: pointer;
			box-shadow: 0 8px 14px rgba(0, 0, 0, 0.08);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
			animation: reveal 0.45s ease both;
		}

		.card:hover {
			transform: translateY(-3px);
			box-shadow: 0 12px 20px rgba(0, 0, 0, 0.13);
		}

		.card img {
			width: 100%;
			height: 280px;
			object-fit: cover;
			background: #e8dbc4;
		}

		.card-content {
			padding: 12px;
			display: grid;
			gap: 7px;
		}

		.name {
			font-family: "Cinzel", serif;
			font-size: 1.02rem;
			font-weight: 700;
		}

		.meta {
			font-size: 0.9rem;
			line-height: 1.35;
		}

		.pill {
			width: fit-content;
			font-size: 0.78rem;
			font-weight: 700;
			padding: 4px 8px;
			border-radius: 999px;
			border: 1px solid rgba(78, 63, 42, 0.4);
			background: #fff;
		}

		.empty {
			grid-column: 1 / -1;
			text-align: center;
			font-weight: 600;
			padding: 24px 10px;
			border: 1px dashed rgba(78, 63, 42, 0.5);
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.55);
		}

		.pagination {
			display: flex;
			justify-content: center;
			gap: 8px;
			padding: 0 24px 24px;
			flex-wrap: wrap;
		}

		.pagination button {
			min-width: 42px;
			padding: 8px 10px;
			font-weight: 700;
		}

		.pagination button.active {
			background: linear-gradient(160deg, #f0d08f, #b88d3f);
			border-color: #5f461e;
		}

		.pagination button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
		}

		.modal {
			position: fixed;
			inset: 0;
			display: none;
			place-items: center;
			padding: 16px;
			background: rgba(26, 20, 12, 0.55);
			z-index: 100;
		}

		.modal.open {
			display: grid;
		}

		.modal-card {
			width: min(760px, 100%);
			max-height: 90vh;
			overflow: auto;
			background: #fff9ee;
			border: 2px solid var(--line);
			border-radius: 16px;
			box-shadow: 0 20px 30px rgba(0, 0, 0, 0.28);
		}

		.modal-top {
			display: grid;
			grid-template-columns: 230px 1fr;
			gap: 16px;
			padding: 18px;
		}

		.modal-top img {
			width: 100%;
			height: 300px;
			object-fit: cover;
			border-radius: 10px;
			background: #e8dbc4;
			border: 1px solid rgba(78, 63, 42, 0.35);
		}

		.modal-body {
			display: grid;
			gap: 8px;
		}

		.modal-name {
			font-family: "Cinzel", serif;
			font-size: clamp(1.2rem, 1.2vw + 1rem, 1.9rem);
		}

		.modal-actions {
			display: flex;
			justify-content: flex-end;
			padding: 0 18px 18px;
		}

		.modal-actions button {
			background: linear-gradient(160deg, #f6dbdb, #dc9f9f);
		}

		@keyframes reveal {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 760px) {
			body {
				padding: 12px;
			}

			.controls {
				grid-template-columns: 1fr;
			}

			.card img {
				height: 240px;
			}

			.modal-top {
				grid-template-columns: 1fr;
			}

			.modal-top img {
				height: 260px;
			}
		}
	</style>
</head>
<body>
	<main class="app">
		<header>
			<h1>Magical Character Index</h1>
			<p class="subtitle">Busca personajes de Harry Potter con la API publica.</p>
		</header>

		<section class="controls" aria-label="Filtros">
			<input id="searchInput" type="text" placeholder="Buscar por nombre..." autocomplete="off">
			<select id="houseSelect" aria-label="Seleccionar casa">
				<option value="all">Todas las casas</option>
				<option value="Gryffindor">Gryffindor</option>
				<option value="Slytherin">Slytherin</option>
				<option value="Ravenclaw">Ravenclaw</option>
				<option value="Hufflepuff">Hufflepuff</option>
				<option value="none">Sin casa</option>
			</select>
			<button id="reloadBtn" type="button">Recargar</button>
		</section>

		<div id="status" class="status" role="status" aria-live="polite"></div>
		<section id="characterGrid" class="grid" aria-label="Listado de personajes"></section>
		<nav id="pagination" class="pagination" aria-label="Paginacion"></nav>
	</main>

	<div id="detailModal" class="modal" aria-hidden="true">
		<div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalName">
			<div class="modal-top">
				<img id="modalImage" src="" alt="Imagen del personaje">
				<div class="modal-body">
					<h2 id="modalName" class="modal-name"></h2>
					<span id="modalHouse" class="pill"></span>
					<p class="meta"><strong>Actor:</strong> <span id="modalActor"></span></p>
					<p class="meta"><strong>Especie:</strong> <span id="modalSpecies"></span></p>
					<p class="meta"><strong>Genero:</strong> <span id="modalGender"></span></p>
					<p class="meta"><strong>Patronus:</strong> <span id="modalPatronus"></span></p>
					<p class="meta"><strong>Nacimiento:</strong> <span id="modalBirth"></span></p>
					<p class="meta"><strong>Estado:</strong> <span id="modalAlive"></span></p>
				</div>
			</div>
			<div class="modal-actions">
				<button id="closeModalBtn" type="button">Cerrar</button>
			</div>
		</div>
	</div>

	<script>
		const API_URL = "https://hp-api.onrender.com/api/characters";
		const PAGE_SIZE = 12;

		const searchInput = document.getElementById("searchInput");
		const houseSelect = document.getElementById("houseSelect");
		const reloadBtn = document.getElementById("reloadBtn");
		const grid = document.getElementById("characterGrid");
		const statusBox = document.getElementById("status");
		const pagination = document.getElementById("pagination");

		const detailModal = document.getElementById("detailModal");
		const closeModalBtn = document.getElementById("closeModalBtn");
		const modalImage = document.getElementById("modalImage");
		const modalName = document.getElementById("modalName");
		const modalHouse = document.getElementById("modalHouse");
		const modalActor = document.getElementById("modalActor");
		const modalSpecies = document.getElementById("modalSpecies");
		const modalGender = document.getElementById("modalGender");
		const modalPatronus = document.getElementById("modalPatronus");
		const modalBirth = document.getElementById("modalBirth");
		const modalAlive = document.getElementById("modalAlive");

		let allCharacters = [];
		let filteredCharacters = [];
		let currentPage = 1;

		function setStatus(message, type = "ok") {
			statusBox.textContent = message;
			statusBox.className = `status ${type}`;
		}

		function clearStatus() {
			statusBox.textContent = "";
			statusBox.className = "status";
		}

		function getHouseValue(character) {
			return character.house && character.house.trim() ? character.house : "none";
		}

		function getImage(character) {
			return character.image && character.image.trim()
				? character.image
				: "https://placehold.co/450x600/e8dbc4/1f1a14?text=Sin+Imagen";
		}

		function getDisplay(value, fallback = "No disponible") {
			return value && String(value).trim() ? value : fallback;
		}

		function openModal(character) {
			modalImage.src = getImage(character);
			modalImage.alt = `Imagen de ${getDisplay(character.name, "personaje")}`;
			modalName.textContent = getDisplay(character.name, "Desconocido");
			modalHouse.textContent = getHouseValue(character) === "none" ? "Sin casa" : character.house;
			modalActor.textContent = getDisplay(character.actor);
			modalSpecies.textContent = getDisplay(character.species);
			modalGender.textContent = getDisplay(character.gender);
			modalPatronus.textContent = getDisplay(character.patronus);
			modalBirth.textContent = getDisplay(character.dateOfBirth);
			modalAlive.textContent = character.alive ? "Vivo" : "Fallecido";

			detailModal.classList.add("open");
			detailModal.setAttribute("aria-hidden", "false");
		}

		function closeModal() {
			detailModal.classList.remove("open");
			detailModal.setAttribute("aria-hidden", "true");
		}

		function createCard(character, index) {
			const card = document.createElement("article");
			card.className = "card";
			card.tabIndex = 0;
			card.setAttribute("role", "button");
			card.setAttribute("aria-label", `Ver detalle de ${getDisplay(character.name, "personaje")}`);
			card.style.animationDelay = `${Math.min(index * 0.03, 0.45)}s`;
			const image = getImage(character);

			card.innerHTML = `
				<img src="${image}" alt="${character.name}">
				<div class="card-content">
					<h2 class="name">${getDisplay(character.name, "Desconocido")}</h2>
					<span class="pill">${getHouseValue(character) === "none" ? "Sin casa" : character.house}</span>
					<p class="meta"><strong>Actor:</strong> ${getDisplay(character.actor)}</p>
					<p class="meta"><strong>Especie:</strong> ${getDisplay(character.species)}</p>
					<p class="meta"><strong>Estado:</strong> ${character.alive ? "Vivo" : "Fallecido"}</p>
				</div>
			`;

			card.addEventListener("click", () => openModal(character));
			card.addEventListener("keydown", (event) => {
				if (event.key === "Enter" || event.key === " ") {
					event.preventDefault();
					openModal(character);
				}
			});

			return card;
		}

		function createPageButton(label, page, disabled = false, active = false) {
			const button = document.createElement("button");
			button.type = "button";
			button.textContent = label;
			button.disabled = disabled;
			if (active) {
				button.classList.add("active");
			}
			button.addEventListener("click", () => {
				currentPage = page;
				renderCharacters(filteredCharacters);
				updateStatus();
			});
			return button;
		}

		function renderPagination(totalItems) {
			pagination.innerHTML = "";

			const totalPages = Math.ceil(totalItems / PAGE_SIZE);
			if (totalPages <= 1) {
				return;
			}

			pagination.appendChild(createPageButton("Anterior", currentPage - 1, currentPage === 1));

			for (let page = 1; page <= totalPages; page += 1) {
				pagination.appendChild(createPageButton(String(page), page, false, page === currentPage));
			}

			pagination.appendChild(createPageButton("Siguiente", currentPage + 1, currentPage === totalPages));
		}

		function updateStatus() {
			const totalPages = Math.max(1, Math.ceil(filteredCharacters.length / PAGE_SIZE));
			setStatus(`Mostrando ${filteredCharacters.length} de ${allCharacters.length} personajes. Pagina ${currentPage} de ${totalPages}.`, "ok");
		}

		function renderCharacters(list) {
			grid.innerHTML = "";
			filteredCharacters = list;

			if (!list.length) {
				const empty = document.createElement("p");
				empty.className = "empty";
				empty.textContent = "No hay personajes que coincidan con el filtro actual.";
				grid.appendChild(empty);
				pagination.innerHTML = "";
				return;
			}

			const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
			if (currentPage > totalPages) {
				currentPage = totalPages;
			}

			const start = (currentPage - 1) * PAGE_SIZE;
			const end = start + PAGE_SIZE;
			const pageItems = list.slice(start, end);

			pageItems.forEach((character, index) => {
				grid.appendChild(createCard(character, index));
			});

			renderPagination(list.length);
		}

		function applyFilters() {
			const search = searchInput.value.trim().toLowerCase();
			const selectedHouse = houseSelect.value;
			currentPage = 1;

			const filtered = allCharacters.filter((character) => {
				const matchesName = character.name.toLowerCase().includes(search);

				if (selectedHouse === "all") {
					return matchesName;
				}

				const house = getHouseValue(character);
				return matchesName && house === selectedHouse;
			});

			renderCharacters(filtered);
			updateStatus();
		}

		async function loadCharacters() {
			setStatus("Cargando personajes...", "ok");
			grid.innerHTML = "";

			try {
				const response = await fetch(API_URL);
				if (!response.ok) {
					throw new Error(`Error ${response.status}: ${response.statusText}`);
				}

				const data = await response.json();
				if (!Array.isArray(data)) {
					throw new Error("Formato inesperado de la API");
				}

				allCharacters = data.filter((character) => character && character.name);
				applyFilters();
			} catch (error) {
				grid.innerHTML = "";
				setStatus(`No se pudo cargar la API. ${error.message}`, "error");
			}
		}

		searchInput.addEventListener("input", applyFilters);
		houseSelect.addEventListener("change", applyFilters);
		reloadBtn.addEventListener("click", loadCharacters);
		closeModalBtn.addEventListener("click", closeModal);
		detailModal.addEventListener("click", (event) => {
			if (event.target === detailModal) {
				closeModal();
			}
		});
		document.addEventListener("keydown", (event) => {
			if (event.key === "Escape" && detailModal.classList.contains("open")) {
				closeModal();
			}
		});

		clearStatus();
		loadCharacters();
	</script>
</body>
</html>
