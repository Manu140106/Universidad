<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Near Earth Objects Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.2rem;
            color: #aaa;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .controls label {
            font-weight: 600;
            color: #bbb;
        }

        .controls input[type="date"] {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .controls input[type="date"]:focus {
            border-color: #ff9800;
        }

        #fetch-btn {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #fetch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }

        #stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 40px;
            padding: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #ff9800;
        }

        #neo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .neo-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid transparent;
        }

        .neo-card:hover {
            transform: translateY(-5px);
        }

        .neo-card.safe {
            border-color: rgba(76, 175, 80, 0.3);
        }

        .neo-card.warning {
            border-color: rgba(255, 152, 0, 0.3);
        }

        .neo-card.danger {
            border-color: rgba(244, 67, 54, 0.3);
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.2);
        }

        .neo-card.danger:hover {
            box-shadow: 0 0 30px rgba(244, 67, 54, 0.4);
        }

        .neo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .neo-name {
            font-size: 1.4rem;
            color: #ff9800;
            margin: 0;
        }

        .neo-date {
            font-size: 0.85rem;
            color: #888;
        }

        .neo-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .neo-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .size-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .size-label {
            font-size: 0.85rem;
            color: #888;
            min-width: 50px;
        }

        .size-bar-bg {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .size-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #ff9800);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .neo-footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.safe {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.4);
        }

        .badge.hazardous {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.4);
        }

        .loading {
            text-align: center;
            font-size: 1.5rem;
            color: #888;
            padding: 60px;
            grid-column: 1 / -1;
        }

        .error {
            text-align: center;
            color: #ff6b6b;
            font-size: 1.2rem;
            padding: 30px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 107, 107, 0.3);
            grid-column: 1 / -1;
        }

        .empty {
            text-align: center;
            color: #aaa;
            font-size: 1.1rem;
            padding: 40px;
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls input[type="date"] {
                width: 100%;
            }

            #fetch-btn {
                width: 100%;
            }

            #neo-container {
                grid-template-columns: 1fr;
            }

            .neo-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚠️ Near Earth Objects Tracker</h1>
        <p>Tracking asteroids & comets approaching Earth</p>
    </header>

    <main>
        <div class="controls">
            <label for="start-date">Start Date:</label>
            <input type="date" id="start-date">
            <label for="end-date">End Date:</label>
            <input type="date" id="end-date">
            <button id="fetch-btn">Fetch NEO Data</button>
        </div>

        <div id="stats-container">
            <div class="stat-card">
                <span class="stat-label">Total NEOs</span>
                <span class="stat-value" id="total-neo">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Potentially Hazardous</span>
                <span class="stat-value" id="hazardous-count">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Largest (meters)</span>
                <span class="stat-value" id="largest-size">0</span>
            </div>
        </div>

        <div id="neo-container">
            <div class="loading">Loading Near Earth Objects...</div>
        </div>
    </main>

    <footer>
        <p>Powered by NASA NeoWs API | Data updated daily</p>
    </footer>

    <script>
        // ⚠️ IMPORTANT: Replace 'YOUR_NASA_API_KEY' with your actual NASA API key
        // Get your free key at: https://api.nasa.gov/
        const NASA_API_KEY = 'YOUR_KEY'; // <-- Replace this with your key!

        const NEO_API_BASE = 'https://api.nasa.gov/neo/rest/v1';

        // Default to last 7 days
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - 7);

        const formatDate = (date) => date.toISOString().split('T')[0];

        async function fetchNEOs(start, end) {
            const url = `${NEO_API_BASE}/feed?start_date=${start}&end_date=${end}&api_key=${NASA_API_KEY}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API Error ${response.status}: ${errorData.error_message || response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                console.error('Failed to fetch NEO data:', error);
                return null;
            }
        }

        function extractNEOs(neoData) {
            if (!neoData || !neoData.near_earth_objects) return [];

            const allNEOS = [];
            const dates = Object.keys(neoData.near_earth_objects);

            dates.forEach(date => {
                const asteroids = neoData.near_earth_objects[date];
                asteroids.forEach(asteroid => {
                    allNEOS.push({
                        id: asteroid.id,
                        name: asteroid.name,
                        date: date,
                        isHazardous: asteroid.is_potentially_hazardous_asteroid,
                        diameterMin: Math.round(asteroid.estimated_diameter.meters.estimated_diameter_min),
                        diameterMax: Math.round(asteroid.estimated_diameter.meters.estimated_diameter_max),
                        velocity: parseFloat(asteroid.close_approach_data[0]?.relative_velocity.kilometers_per_hour || 0),
                        missDistance: parseFloat(asteroid.close_approach_data[0]?.miss_distance.kilometers || 0),
                        orbitClass: asteroid.orbiting_body
                    });
                });
            });

            return allNEOS;
        }

        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toLocaleString();
        }

        function getDangerLevel(neo) {
            if (neo.isHazardous) return 'danger';
            if (neo.missDistance < 0.05) return 'warning';
            return 'safe';
        }

        async function renderNEOs() {
            const container = document.getElementById('neo-container');
            const startDateInput = document.getElementById('start-date');
            const endDateInput = document.getElementById('end-date');

            startDateInput.value = formatDate(startDate);
            endDateInput.value = formatDate(endDate);

            container.innerHTML = '<div class="loading">Fetching Near Earth Objects from NASA...</div>';

            const start = startDateInput.value;
            const end = endDateInput.value;

            const data = await fetchNEOs(start, end);

            if (!data) {
                container.innerHTML = `
                    <div class="error">
                        <strong>Failed to load NEO data.</strong><br>
                        <small>Please check that you have set a valid NASA API key in the code.<br>
                        Replace 'YOUR_NASA_API_KEY' on line 151 with your actual key from api.nasa.gov</small>
                    </div>`;
                return;
            }

            const neos = extractNEOs(data);

            document.getElementById('total-neo').textContent = neos.length;
            document.getElementById('hazardous-count').textContent = neos.filter(n => n.isHazardous).length;

            const largestDiameter = Math.max(...neos.map(n => n.diameterMax));
            document.getElementById('largest-size').textContent = formatNumber(largestDiameter);

            if (neos.length === 0) {
                container.innerHTML = '<div class="empty">No Near Earth Objects found for this date range.</div>';
                return;
            }

            neos.sort((a, b) => a.missDistance - b.missDistance);

            container.innerHTML = neos.map(neo => {
                const dangerClass = getDangerLevel(neo);
                const sizeBar = Math.min((neo.diameterMax / 1000) * 100, 100);

                return `
                    <div class="neo-card ${dangerClass}">
                        <div class="neo-header">
                            <h3 class="neo-name">${neo.name}</h3>
                            <span class="neo-date">${neo.date}</span>
                        </div>
                        <div class="neo-body">
                            <div class="neo-stats">
                                <div class="stat-row">
                                    <span class="stat-label">Diameter</span>
                                    <span class="stat-value">${formatNumber(neo.diameterMin)} - ${formatNumber(neo.diameterMax)} m</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Velocity</span>
                                    <span class="stat-value">${formatNumber(Math.round(neo.velocity))} km/h</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Miss Distance</span>
                                    <span class="stat-value ${neo.missDistance < 0.05 ? 'warning' : ''}">${neo.missDistance.toFixed(3)} km</span>
                                </div>
                            </div>
                            <div class="size-indicator">
                                <div class="size-label">Size</div>
                                <div class="size-bar-bg">
                                    <div class="size-bar-fill" style="width: ${sizeBar}%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="neo-footer">
                            ${neo.isHazardous
                                ? '<span class="badge hazardous">⚠️ Potentially Hazardous</span>'
                                : '<span class="badge safe">✓ Safe</span>'
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('fetch-btn').addEventListener('click', renderNEOs);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') renderNEOs();
        });

        document.addEventListener('DOMContentLoaded', renderNEOs);
    </script>
</body>
</html>
