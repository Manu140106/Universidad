<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"
      integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
      crossorigin="anonymous"
    />

    <script type="text/javascript">
      (function () {
        console.log("script js al inicio....");
        conectarAPI();
      })();

      // Paso 1: Función para conectar a la API
      function conectarAPI() {
        let proxy = "https://corsproxy.io/?";
        const apiUrl = proxy+'https://restcountries.com/v3.1/all?fields=name,cca2';
        console.log(apiUrl)
        fetch(apiUrl)
          .then(response => {
            if (!response.ok) {
              throw new Error('Error en la respuesta de la API: ' + response.status);
            }
            return response.json();
          })
          .then(data => {
            console.log('Datos recibidos de la API:', data);
            cargarJSON(data);
          })
          .catch(error => {
            console.error('Error al conectar con la API:', error);
          });
      }

      // Paso 2: Función para procesar el JSON
      function cargarJSON(data) {
        const paises = data.map(pais => ({
          code: pais.cca2,
          name: pais.name.common
        }));
        
        // Ordenar países alfabéticamente
        paises.sort((a, b) => a.name.localeCompare(b.name));
        
        console.log('Países procesados:', paises);
        cargarOpciones(paises);
      }

      // Paso 3: Función para cargar las opciones en el select
      function cargarOpciones(paises) {
        const selectPais = document.getElementById('pais');
        
        paises.forEach(pais => {
          const option = document.createElement('option');
          option.value = pais.code;
          option.textContent = pais.name;
          selectPais.appendChild(option);
        });
        
        console.log('Opciones cargadas en el select:', paises.length);
      }

      function obtenerInfo() {
        console.log("clic");

        // 1. Inputs de texto, email, etc.
        const nombre = document.getElementById("nombre").value.trim();
        const correo = document.getElementById("correo").value.trim();

        const pais = document.getElementById("pais").value.trim();

        const generoSeleccionado = document.querySelector('input[name="genero"]:checked');
        const genero = generoSeleccionado ? generoSeleccionado.value : "";

        const interesesSeleccionados = document.querySelectorAll(
          'input[name="intereses"]:checked',
        );
        const intereses = Array.from(interesesSeleccionados).map(
          (chk) => chk.value,
        );

        // Construimos el HTML de salida
        let html = "";
        html += `<p><strong>Nombre:</strong> ${nombre || "(sin nombre)"}</p>`;
        html += `<p><strong>Correo:</strong> ${correo || "(sin correo)"}</p>`;
        html += `<p><strong>País:</strong> ${pais || "(no seleccionado)"}</p>`;
        html += `<p><strong>Género:</strong> ${genero || "(no seleccionado)"}</p>`;
        html += `<p><strong>Intereses:</strong> ${
          intereses.length > 0 ? intereses.join(", ") : "(ninguno)"
        }</p>`;

        //mostrar
        document.getElementById("divMostrar").innerHTML = html;
      }
    </script>
  </head>

  <body>
    <div class="container">
      <div class="row">
        <div class="col-sm-12">
          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" class="form-control" name="nombre" id="nombre" />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12">
          <div class="form-group">
            <label for="nombre">Correo:</label>
            <input
              type="email"
              class="form-control"
              name="correo"
              id="correo"
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12">
          <div class="form-group">
            <label for="nombre">País:</label>
            <select name="pais" class="form-control" id="pais">
              <option value="">-- Seleccione --</option>
            </select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12">
          <div class="form-group">
            <label for="nombre">Género:</label> <br />
            <input
              type="radio"
              class="form-check-input"
              name="genero"
              id="genero"
              value="M"
            />
            Masculino
            <input
              type="radio"
              class="form-check-input"
              name="genero"
              id="genero"
              value="F"
            />
            Femenino
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12">
          <div class="form-group">
            <label for="nombre">Intereses:</label> <br />
            <input type="checkbox" name="intereses" value="deporte" />
            Deporte
            <input type="checkbox" name="intereses" value="musica" />
            Música
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12">
          <button class="btn" onclick="obtenerInfo()">Agregar</button>
        </div>
      </div>

      <div class="row" id="divMostrar"></div>
    </div>

    <!-- Optional theme -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap-theme.min.css"
      integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
      crossorigin="anonymous"
    />

    <!-- bootsrap require jQuery-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

    <!-- Latest compiled and minified JavaScript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"
      integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
